reference:
  # type: circle | waypoints | figure8 | lane_change
  type: circle
  radius: 8.0
  speed: 1.5
  center: [0.0, 0.0]
  start_angle: 0.0
  n_points: 400
  waypoints:
    - [0.0, 0.0]
    - [4.0, 0.0]
    - [6.0, 2.0]
    - [2.0, 4.0]
    - [-2.0, 4.0]
    - [-6.0, 2.0]
    - [-8.0, 0.0]
  # Lane-change parameters (used when type: lane_change)
  lane_change:
    lane_width: 3.5       # lateral displacement between lanes (m)
    straight_length: 20.0 # length of straight approach/exit sections (m)
    transition_length: 15.0 # longitudinal length of the S-curve transition (m)

track:
  radius: 8.0
  speed: 1.5
  center: [0.0, 0.0]
  start_angle: 0.0

obstacles:
  - type: static
    position: [4.0, 0.0]
    radius: 0.7
  - type: static
    position: [-5.0, 2.0]
    radius: 0.7
  - type: moving
    start: [-6.0, -4.0]
    velocity: [0.05, 0.08]
    radius: 0.5

simulation:
  max_steps: 200
  log_interval: 10
